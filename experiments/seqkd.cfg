[config]

teacher_model = Qwen/Qwen2.5-7B-Instruct
student_model = Qwen/Qwen2.5-0.5B-Instruct
language_code = npi

; HF dataset ID or local path with teacher translations.
; Generate with: python scripts/generate_seqkd_data.py experiments/seqkd.cfg
seqkd_data_path = None
max_samples = 5000

max_steps = 2000
batch_size = 4
grad_accum_steps = 8
learning_rate = 5e-5
weight_decay = 0.01
warmup_ratio = 0.06
lr_scheduler = cosine
max_length = 512

eval_split_ratio = 0.05
eval_every = 200

hf_repo_id = lecslab
output_dir = ../distilled_models/seqkd
log_every = 50
