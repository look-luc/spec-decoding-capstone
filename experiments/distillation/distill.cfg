[config]

task = translation
teacher_model = Qwen/Qwen2.5-7B-Instruct
student_model = Qwen/Qwen2.5-0.5B-Instruct
language_code = ber

dataset_path = logprobs/logprobs-Qwen2.5-7B-Instruct-npi-general.parquet
dataset_split = train

max_steps = 5000
batch_size = 16
grad_accum_steps = 4
learning_rate = 2e-5
max_length = 512

hf_repo_id = lecslab
output_dir = ../distilled_models/qwen7b-to-qwen0.5b-ber-default
save_every = 500
log_every = 4
